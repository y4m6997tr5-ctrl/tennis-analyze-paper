<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; text-align: center; }

#score {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  color: white;
  padding: 10px;
  font-size: 18px;
}

#app {
  margin-top: 80px;
}

button {
  width: 80%;
  padding: 20px;
  margin: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>

<script>
// ===== 試合状態 =====
let match = {
  sets: [0, 0],
  currentSet: [0, 0],
  currentGame: [0, 0],
  tiebreak: false,
  tiebreakPoints: [0, 0]
};

// ===== 記録 =====
let data = JSON.parse(localStorage.getItem("tennisData") || "[]");
let current = {};
let state = "start";

// ===== ポイント表示 =====
const pointMap = [0, 15, 30, 40];

// ===== UI描画 =====
function render() {
  const app = document.getElementById("app");

  if (state === "start") {
    app.innerHTML = `<button onclick="next('point')">試合開始</button>`;
  }

  else if (state === "point") {
    app.innerHTML = `
      <button onclick="setWinner('me')">自分</button>
      <button onclick="setWinner('opponent')">相手</button>
    `;
  }

  else if (state === "type") {
    app.innerHTML = `
      <button onclick="setType('SA')">SA</button>
      <button onclick="setType('Rally')">Rally</button>
    `;
  }

  else if (state === "rally1") {
    app.innerHTML = `
      <button onclick="setDetail('side','F')">F</button>
      <button onclick="setDetail('side','B')">B</button>
    `;
  }

  else if (state === "rally2") {
    app.innerHTML = `
      <button onclick="setDetail('style','S')">S</button>
      <button onclick="setDetail('style','V')">V</button>
    `;
  }

  else if (state === "rally3") {
    app.innerHTML = `
      <button onclick="setDetail('result','O')">O</button>
      <button onclick="setDetail('result','N')">N</button>
    `;
  }
}

// ===== 状態遷移 =====
function next(s) {
  state = s;
  render();
}

function setWinner(w) {
  current = { winner: w };
  next("type");
}

function setType(t) {
  current.type = t;

  if (t === "SA") {
    save();
  } else {
    current.detail = {};
    next("rally1");
  }
}

function setDetail(key, val) {
  current.detail[key] = val;

  if (state === "rally1") next("rally2");
  else if (state === "rally2") next("rally3");
  else if (state === "rally3") save();
}

// ===== 保存＋スコア更新 =====
function save() {
  current.time = new Date().toISOString();
  data.push(current);
  localStorage.setItem("tennisData", JSON.stringify(data));

  pointWon(current.winner);

  state = "point";
  render();
}

// ===== スコアロジック =====
function pointWon(player) {
  let p = player === "me" ? 0 : 1;
  let o = p === 0 ? 1 : 0;

  if (match.tiebreak) {
    match.tiebreakPoints[p]++;

    if (
      match.tiebreakPoints[p] >= 7 &&
      match.tiebreakPoints[p] - match.tiebreakPoints[o] >= 2
    ) {
      gameWon(p);
      match.tiebreak = false;
      match.tiebreakPoints = [0, 0];
    }
  } else {
    match.currentGame[p]++;

    if (
      match.currentGame[p] >= 4 &&
      match.currentGame[p] - match.currentGame[o] >= 2
    ) {
      gameWon(p);
    }
  }

  updateScore();
}

function gameWon(p) {
  let o = p === 0 ? 1 : 0;

  match.currentSet[p]++;
  match.currentGame = [0, 0];

  // タイブレーク突入
  if (match.currentSet[0] === 6 && match.currentSet[1] === 6) {
    match.tiebreak = true;
    return;
  }

  if (
    match.currentSet[p] >= 6 &&
    match.currentSet[p] - match.currentSet[o] >= 2
  ) {
    setWon(p);
  }
}

function setWon(p) {
  match.sets[p]++;
  match.currentSet = [0, 0];

  if (match.sets[p] === 2) {
    alert("試合終了！");
    state = "start";
    render();
  }
}

// ===== 表示 =====
function getScoreText() {
  let p = match.currentGame;

  let pointText;

  if (match.tiebreak) {
    pointText = `${match.tiebreakPoints[0]}-${match.tiebreakPoints[1]}`;
  } else if (p[0] >= 3 && p[1] >= 3) {
    if (p[0] === p[1]) pointText = "デュース";
    else if (p[0] > p[1]) pointText = "Ad 自分";
    else pointText = "Ad 相手";
  } else {
    pointText = `${pointMap[p[0]]}-${pointMap[p[1]]}`;
  }

  return `
  セット ${match.sets[0]}-${match.sets[1]}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]}<br>
  ポイント ${pointText}
  `;
}

function updateScore() {
  document.getElementById("score").innerHTML = getScoreText();
}

// ===== 初期化 =====
render();
updateScore();

</script>

</body>
</html>
