<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; text-align: center; }
button {
  width: 80%;
  padding: 20px;
  margin: 10px;
  font-size: 20px;
}
</style>
</head>
<body>

<h2 id="title"></h2>
<div id="app"></div>

<script>
let state = "start";
let current = {};
let data = JSON.parse(localStorage.getItem("tennisData") || "[]");

function render() {
  const app = document.getElementById("app");
  const title = document.getElementById("title");

  // 毎回リセット
  app.innerHTML = "";

  if (state === "start") {
    title.innerText = "試合開始";
    app.innerHTML = `
      <button onclick="startMatch()">試合開始</button>
    `;
  }

  else if (state === "point") {
    title.innerText = "ポイントを取ったのは？";
    app.innerHTML = `
      <button onclick="setWinner('me')">自分</button>
      <button onclick="setWinner('opponent')">相手</button>
    `;
  }

  else if (state === "type") {
    title.innerText = "SA or Rally？";
    app.innerHTML = `
      <button onclick="setType('SA')">SA</button>
      <button onclick="setType('Rally')">Rally</button>
    `;
  }

  else if (state === "rally1") {
    title.innerText = "F or B？";
    app.innerHTML = `
      <button onclick="setDetail('side','F')">F</button>
      <button onclick="setDetail('side','B')">B</button>
    `;
  }

  else if (state === "rally2") {
    title.innerText = "S or V？";
    app.innerHTML = `
      <button onclick="setDetail('style','S')">S</button>
      <button onclick="setDetail('style','V')">V</button>
    `;
  }

  else if (state === "rally3") {
    title.innerText = "O or N？";
    app.innerHTML = `
      <button onclick="setDetail('result','O')">O</button>
      <button onclick="setDetail('result','N')">N</button>
    `;
  }
}

function startMatch() {
  state = "point";
  render();
}

function setWinner(w) {
  current = { winner: w };
  state = "type";
  render();
}

function setType(t) {
  current.type = t;

  if (t === "SA") {
    save();
  } else {
    current.detail = {};
    state = "rally1";
    render();
  }
}

function setDetail(key, val) {
  current.detail[key] = val;

  if (state === "rally1") {
    state = "rally2";
  } else if (state === "rally2") {
    state = "rally3";
  } else if (state === "rally3") {
    save();
    return;
  }

  render();
}

function save() {
  current.time = new Date().toISOString();
  data.push(current);

  localStorage.setItem("tennisData", JSON.stringify(data));

  // 次のポイントへ
  current = {};
  state = "point";
  render();
}

// ← これが超重要（初期表示）
render();
</script>

</body>
</html>
