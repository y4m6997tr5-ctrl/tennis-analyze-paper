<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:200px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
  font-size:18px;
}

input {
  width:80%;
  padding:14px;
  margin:8px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== DOM（明示取得）=====
const app = document.getElementById("app");
const controls = document.getElementById("controls");
const score = document.getElementById("score");

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup";
let server="me";
let servePhase=1;

// ===== スコア =====
let match={set:[0,0],game:[0,0],finished:false};

// ===== タイブレーク =====
let tiebreak=false;
let tb=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

// ===== 共通 =====
function sw(p){ return p==="me"?"opponent":"me"; }
function name(p){ return p==="me"?info.myName:info.oppName; }

// ===== UI =====
function render(){

  if(state==="setup"){
    app.innerHTML=`
    <input id="mySchool" placeholder="自校名"><br>
    <input id="oppSchool" placeholder="相手校名"><br>
    <input id="myName" placeholder="自分の名前"><br>
    <input id="oppName" placeholder="相手の名前"><br>
    <button onclick="setFirst('me')">自分サーブ</button>
    <button onclick="setFirst('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="start()">試合開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML="<h2>試合終了</h2>";
    controls.innerHTML="";
    return;
  }

  controls.innerHTML=`
    <button onclick="type('SA')">SA</button>
    <button onclick="type('F')">フォルト</button>
    <button onclick="type('R')">ラリー</button>
  `;

  app.innerHTML=`
  <h3>${name(server)} サーブ</h3>
  <p>${servePhase===1?"1stサーブ":"2ndサーブ"}</p>
  `;
}

// ===== スコア =====
function scoreText(){
  if(tiebreak) return tb[0]+"-"+tb[1];

  let a=match.game[0],b=match.game[1];

  if(a>=3 && b>=3){
    if(a===b) return "デュース";
    return a>b ? "Ad "+info.myName : "Ad "+info.oppName;
  }
  return pointMap[a]+"-"+pointMap[b];
}

function updateScore(){
  score.innerHTML=`
  ${info.mySchool} ${info.myName}
  vs
  ${info.oppSchool} ${info.oppName}<br>
  ゲーム ${match.set[0]}-${match.set[1]} |
  ポイント ${scoreText()}
  `;
}

// ===== 開始（修正済）=====
function setFirst(p){ info.firstServer=p; }

function start(){
  info.mySchool=document.getElementById("mySchool").value;
  info.oppSchool=document.getElementById("oppSchool").value;
  info.myName=document.getElementById("myName").value;
  info.oppName=document.getElementById("oppName").value;

  server=info.firstServer;
  state="type";
  updateScore();
  render();
}

// ===== 入力 =====
function type(t){

  if(t==="SA"){
    point(server);
    return;
  }

  if(t==="F"){
    if(servePhase===1){
      servePhase=2;
      render();
      return;
    }
    point(sw(server));
    return;
  }

  let winner = prompt("最後に打ったのは？ me / opponent");

  if(winner!=="me" && winner!=="opponent"){
    alert("me か opponent を入力");
    return;
  }

  point(winner);
}

// ===== 得点 =====
function point(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tb[i]++;
    tbCount++;

    if(tbCount===1 || tbCount%2===1){
      server=sw(server);
    }

    if(tb[i]>=7 && tb[i]-tb[o]>=2){
      match.set[i]++;
      match.finished=true;
    }

    servePhase=1;
    state="type";
    updateScore();
    render();
    return;
  }

  match.game[i]++;

  let a=match.game[0],b=match.game[1];

  if((a>=4||b>=4)&&Math.abs(a-b)>=2){
    match.set[i]++;
    match.game=[0,0];
    server=sw(server);

    if(match.set[0]===6 && match.set[1]===6){
      tiebreak=true;
      tb=[0,0];
      tbCount=0;
    }

    if(match.set[i]>=6 && Math.abs(match.set[0]-match.set[1])>=2){
      match.finished=true;
    }
  }

  servePhase=1;
  state="type";
  updateScore();
  render();
}

// ===== ★重要：onclick対策 =====
window.setFirst = setFirst;
window.start = start;
window.type = type;

// ===== 初期 =====
render();

</script>
</body>
</html>
