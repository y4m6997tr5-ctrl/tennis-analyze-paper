<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:180px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
}

table {
  border-collapse: collapse;
  width:100%;
  font-size:12px;
}

td, th {
  border:1px solid black;
  padding:4px;
  text-align:center;
  vertical-align:top;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;
let firstFaultFlag=false;

let gamePointIndex=0;
let gameNumber=1;

// ===== タイブレーク =====
let tiebreak=false;
let tbPoints=[0,0];
let tbServeCount=0;

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};

const pointMap=[0,15,30,40];

// ===== 共通 =====
function switchPlayer(p){ return p==="me"?"opponent":"me"; }
function label(p){
  return p==="me"
    ? `${info.mySchool}/${info.myName}`
    : `${info.oppSchool}/${info.oppName}`;
}

function toCircle(n){
  const nums=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
              "⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
  return nums[n-1]||n;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分の名前"><br>
      <input id="oppName" placeholder="相手の名前"><br>
      <button onclick="setFirstServer('me')">自分が最初にサーブ</button>
      <button onclick="setFirstServer('opponent')">相手が最初にサーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">試合開始</button>`;
    return;
  }

  if(match.finished){
    buildSheet();
    app.innerHTML = renderSheet();
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">サービスエース</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }
  else if(state==="cause"){
    controls.innerHTML=`
      <button onclick="setCause('me')">${label("me")}</button>
      <button onclick="setCause('opponent')">${label("opponent")}</button>
    `;
  }
  else if(state==="rally1"){
    controls.innerHTML=`
      <button onclick="setDetail('side','F')">フォア</button>
      <button onclick="setDetail('side','B')">バック</button>
    `;
  }
  else if(state==="rally2"){
    controls.innerHTML=`
      <button onclick="setDetail('style','S')">ストローク</button>
      <button onclick="setDetail('style','V')">ボレー</button>
    `;
  }
  else if(state==="rally3"){
    controls.innerHTML=`
      <button onclick="setDetail('result','O')">アウト</button>
      <button onclick="setDetail('result','N')">ネット</button>
      <button onclick="setDetail('result','A')">エース</button>
    `;
  }

  app.innerHTML=`
    <h3>${label(server)}</h3>
    <p>ゲーム ${match.currentSet[0]}-${match.currentSet[1]}</p>
    <p>${servePhase===1?"1stサーブ":"2ndサーブ"}</p>
  `;
}

// ===== 開始 =====
function setFirstServer(s){ info.firstServer=s; }
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";
  render();
}

// ===== 入力 =====
function handleType(t){
  current={type:t};

  if(t==="SA"){
    recordPoint(server,"SA");
    return;
  }

  if(t==="F"){ handleFault(); return; }

  current.detail={};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){
  if(servePhase===1){
    servePhase=2;
    firstFaultFlag=true;
    render();
    return;
  }
  recordPoint(switchPlayer(server),"WF");
}

// ===== ラリー =====
function setCause(p){ current.causePlayer=p; state="rally1"; render(); }

function setDetail(k,v){
  current.detail[k]=v;

  if(state==="rally1") state="rally2";
  else if(state==="rally2") state="rally3";
  else{
    let winner = decide(current.causePlayer,current.detail.result);
    let d=current.detail;
    let action=d.side+d.style+d.result;

    if(firstFaultFlag){
      action="'"+action;
    }

    recordPoint(winner,action);
    return;
  }

  render();
}

// ===== 判定 =====
function decide(p,r){
  return r==="A" ? p : switchPlayer(p);
}

// ===== 核（統合処理）=====
function recordPoint(winner,actionType){

  // 得点
  pointWon(winner);

  gamePointIndex++;

  data.push({
    player:label(winner),
    gameNumber,
    actionIndex:gamePointIndex,
    actionType,
    server:label(server)
  });

  // ゲーム終了判定（デュース完全対応）
  let p0=match.currentGame[0];
  let p1=match.currentGame[1];

  if(!tiebreak && p0>=4 || p1>=4){
    if(Math.abs(p0-p1)>=2){
      gameWon(p0>p1?0:1);
    }
  }

  servePhase=1;
  firstFaultFlag=false;

  render();
}

// ===== 得点 =====
function pointWon(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tbPoints[i]++;

    tbServeCount++;
    if(tbServeCount===1 || tbServeCount%2===1){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      match.currentSet[i]++;
      tiebreak=false;
      tbPoints=[0,0];
      match.currentGame=[0,0];
      server=switchPlayer(server);
      match.finished=true;
    }

    updateScore();
    return;
  }

  match.currentGame[i]++;
  updateScore();
}

// ===== ゲーム =====
function gameWon(p){
  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;
  gameNumber++;
  server=switchPlayer(server);

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true;
    tbPoints=[0,0];
    tbServeCount=0;
    return;
  }

  if(match.currentSet[p]>=6){
    match.finished=true;
  }
}

// ===== 表示 =====
function getScore(){

  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;

  let p=match.currentGame;

  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1]?"Ad 自分":"Ad 相手";
  }

  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  score.innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}
  `;
}

// ===== シート =====
let sheet={};

function buildSheet(){
  sheet={};
  data.forEach(d=>{
    if(!sheet[d.gameNumber]){
      sheet[d.gameNumber]={meP:[],meM:[],opP:[],opM:[]};
    }
    let r=sheet[d.gameNumber];
    let text=toCircle(d.actionIndex)+d.actionType;

    let isMe=d.player.includes(info.myName);

    if(d.actionType==="WF"){
      r.meM.push(text);
    }
    else if(d.actionType==="SA"){
      r.meP.push(text);
    }
    else if(d.actionType.includes("A")){
      isMe?r.meP.push(text):r.opP.push(text);
    }
    else{
      isMe?r.meM.push(text):r.opM.push(text);
    }
  });
}

function renderSheet(){
  let html="<table>";
  Object.keys(sheet).forEach(g=>{
    let r=sheet[g];
    html+=`
    <tr>
      <td>${g}</td>
      <td>${r.meP.join(" ")}</td>
      <td>${r.meM.join(" ")}</td>
      <td>${r.opP.join(" ")}</td>
      <td>${r.opM.join(" ")}</td>
    </tr>`;
  });
  html+="</table>";
  return html;
}

// ===== 初期 =====
render();
updateScore();

</script>
</body>
</html>
このようなコードでテニスの結果を記録するものを作っています。
