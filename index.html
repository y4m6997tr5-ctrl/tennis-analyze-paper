<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }
#score { position: fixed; top: 0; width: 100%; background: black; color: white; padding: 10px; text-align: center; }
#app { padding-top: 120px; padding-bottom: 200px; text-align: center; }
#controls { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 10px 0; }
button { width: 80%; padding: 14px; margin: 5px; }
canvas { margin-top:20px; }
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;
let gamePointIndex=0;

// ===== 統計（両者） =====
let stats={
  me:initStats(),
  opponent:initStats()
};

function initStats(){
  return {
    firstServeAttempt:0,
    firstServeIn:0,
    doubleFault:0,
    servePoint:0
  };
}

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};

// ===== TB =====
let tiebreak=false;
let tbPoints=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

function switchPlayer(p){return p==="me"?"opponent":"me";}
function label(p){return p==="me"?`${info.mySchool}/${info.myName}`:`${info.oppSchool}/${info.oppName}`;}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分"><br>
      <input id="oppName" placeholder="相手"><br>
      <button onclick="setFirstServer('me')">自分サーブ</button>
      <button onclick="setFirstServer('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML=`
      <h3>結果</h3>
      <textarea style="width:95%;height:200px;">${generateCSV()}</textarea>
      <canvas id="chart" width="300" height="300"></canvas>
    `;
    controls.innerHTML="";
    drawChart();
    return;
  }

  controls.innerHTML=`
    <button onclick="handleType('SA')">SA</button>
    <button onclick="handleType('F')">F</button>
    <button onclick="handleType('Rally')">Rally</button>
  `;

  app.innerHTML=`<h3>${label(server)}</h3>`;
}

// ===== 試合開始 =====
function setFirstServer(s){info.firstServer=s;}
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";render();
}

// ===== 入力 =====
function handleType(t){

  let s=stats[server];

  if(t==="SA"){
    if(servePhase===1){
      s.firstServeAttempt++;
      s.firstServeIn++;
    }
    s.servePoint++;

    pointWon(server);
    save(server,"SA");
    return;
  }

  if(t==="F"){
    if(servePhase===1){
      s.firstServeAttempt++;
      servePhase=2;
      save(server,"'");
      return;
    }

    s.doubleFault++;
    s.servePoint++;

    pointWon(switchPlayer(server));
    save(server,"WF");
    return;
  }

  // ラリー（1st成功）
  if(servePhase===1){
    s.firstServeAttempt++;
    s.firstServeIn++;
  }

  // 簡略：ラリーはA扱い
  s.servePoint++;
  pointWon(server);
  save(server,"R");
}

// ===== 得点 =====
function pointWon(p){
  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tbPoints[i]++;
    tbCount++;

    if(tbCount===1 || (tbCount>1 && tbCount%2===1)){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      gameWon(i);
      tiebreak=false;
      tbPoints=[0,0];
      tbCount=0;
    }

  }else{
    match.currentGame[i]++;
    if(match.currentGame[i]>=4 && match.currentGame[i]-match.currentGame[o]>=2){
      gameWon(i);
    }
  }

  updateScore();
}

// ===== ゲーム =====
function gameWon(p){
  let o=p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;

  stats.me=initStats();
  stats.opponent=initStats();

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true; return;
  }

  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    match.finished=true;
  }

  server=switchPlayer(server);
}

// ===== 表示 =====
function getRate(s){
  let fs=s.firstServeAttempt?Math.round(s.firstServeIn/s.firstServeAttempt*100):0;
  let df=s.servePoint?Math.round(s.doubleFault/s.servePoint*100):0;
  return `1st:${fs}% WF:${df}%`;
}

function getScore(){
  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;

  let p=match.currentGame;
  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "Deuce";
    return p[0]>p[1]?"Ad Me":"Ad Opp";
  }
  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  document.getElementById("score").innerHTML=`
  ${getScore()}<br>
  自分:${getRate(stats.me)}<br>
  相手:${getRate(stats.opponent)}
  `;
}

// ===== CSV =====
function generateCSV(){
  let csv="player,game,actionType,rate\n";

  data.forEach(d=>{
    let s=stats[d.server];
    let rate=s.firstServeAttempt?Math.round(s.firstServeIn/s.firstServeAttempt*100):0;
    csv+=`${d.player},${d.game},${d.actionType},${rate}%\n`;
  });

  return csv;
}

// ===== 保存 =====
function save(actor,action){
  gamePointIndex++;

  data.push({
    player:label(actor),
    game:match.currentSet[0]+"-"+match.currentSet[1],
    actionType:action,
    server:actor
  });

  servePhase=1;
  render();
}

// ===== 円グラフ =====
function drawChart(){
  let ctx=document.getElementById("chart").getContext("2d");

  let counts={};

  data.forEach(d=>{
    if(d.player.includes(info.myName)){
      counts[d.actionType]=(counts[d.actionType]||0)+1;
    }
  });

  let total=Object.values(counts).reduce((a,b)=>a+b,0);
  let start=0;

  Object.keys(counts).forEach(key=>{
    let val=counts[key];
    let angle=(val/total)*Math.PI*2;

    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,100,start,start+angle);
    ctx.fill();

    start+=angle;
  });
}

// ===== 初期 =====
render();
updateScore();

</script>
</body>
</html>
