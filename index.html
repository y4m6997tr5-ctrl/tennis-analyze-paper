<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:200px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
  font-size:18px;
}

input {
  width:80%;
  padding:14px;
  margin:8px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== DOM =====
const app = document.getElementById("app");
const controls = document.getElementById("controls");
const score = document.getElementById("score");

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup";
let server="me";
let servePhase=1;

// ===== スコア =====
let match={set:[0,0],game:[0,0],finished:false};

// ===== タイブレーク =====
let tiebreak=false;
let tb=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

// ===== ラリー用 =====
let current={};

// ===== 共通 =====
function sw(p){ return p==="me"?"opponent":"me"; }
function nameFull(p){
  return p==="me"
    ? info.mySchool+" "+info.myName
    : info.oppSchool+" "+info.oppName;
}

// ===== UI =====
function render(){

  if(state==="setup"){
    app.innerHTML=`
    <input id="mySchool" placeholder="自校名"><br>
    <input id="oppSchool" placeholder="相手校名"><br>
    <input id="myName" placeholder="自分の名前"><br>
    <input id="oppName" placeholder="相手の名前"><br>
    `;
    controls.innerHTML=`<button id="startBtn">試合開始</button>`;
    document.getElementById("startBtn").onclick=start;
    return;
  }

  if(match.finished){
    app.innerHTML="<h2>試合終了</h2>";
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button id="sa">SA</button>
      <button id="fault">フォルト</button>
      <button id="rally">ラリー</button>
    `;
    document.getElementById("sa").onclick=()=>type("SA");
    document.getElementById("fault").onclick=()=>type("F");
    document.getElementById("rally").onclick=()=>type("R");
  }

  else if(state==="cause"){
    controls.innerHTML=`
      <button id="me">${nameFull("me")}</button>
      <button id="op">${nameFull("opponent")}</button>
    `;
    document.getElementById("me").onclick=()=>{current.player="me"; next("side");};
    document.getElementById("op").onclick=()=>{current.player="opponent"; next("side");};
  }

  else if(state==="side"){
    controls.innerHTML=`
      <button id="f">フォア</button>
      <button id="b">バック</button>
    `;
    document.getElementById("f").onclick=()=>{current.side="F"; next("style");};
    document.getElementById("b").onclick=()=>{current.side="B"; next("style");};
  }

  else if(state==="style"){
    controls.innerHTML=`
      <button id="s">ストローク</button>
      <button id="v">ボレー</button>
    `;
    document.getElementById("s").onclick=()=>{current.style="S"; next("result");};
    document.getElementById("v").onclick=()=>{current.style="V"; next("result");};
  }

  else if(state==="result"){
    controls.innerHTML=`
      <button id="o">アウト</button>
      <button id="n">ネット</button>
      <button id="a">エース</button>
    `;
    document.getElementById("o").onclick=()=>finish("O");
    document.getElementById("n").onclick=()=>finish("N");
    document.getElementById("a").onclick=()=>finish("A");
  }

  app.innerHTML=`
  <h3>${nameFull(server)} サーブ</h3>
  <p>${servePhase===1?"1stサーブ":"2ndサーブ"}</p>
  `;
}

function next(s){ state=s; render(); }

// ===== 入力 =====
function type(t){
  if(t==="SA"){ point(server); return; }

  if(t==="F"){
    if(servePhase===1){ servePhase=2; render(); return; }
    point(sw(server));
    return;
  }

  current={};
  state="cause";
  render();
}

function finish(r){
  let winner = (r==="A") ? current.player : sw(current.player);
  point(winner);
}

// ===== スコア =====
function scoreText(){
  if(tiebreak) return tb[0]+"-"+tb[1];

  let a=match.game[0],b=match.game[1];

  if(a>=3 && b>=3){
    if(a===b) return "デュース";
    return a>b ? "Ad "+info.myName : "Ad "+info.oppName;
  }
  return pointMap[a]+"-"+pointMap[b];
}

function updateScore(){
  score.innerHTML=`
  ${info.mySchool} ${info.myName} vs ${info.oppSchool} ${info.oppName}<br>
  ゲーム ${match.set[0]}-${match.set[1]} |
  ポイント ${scoreText()}
  `;
}

// ===== 得点 =====
function point(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tb[i]++;
    tbCount++;

    if(tbCount===1 || tbCount%2===1){
      server=sw(server);
    }

    if(tb[i]>=7 && tb[i]-tb[o]>=2){
      match.set[i]++;
      match.finished=true;
    }

    servePhase=1;
    state="type";
    updateScore();
    render();
    return;
  }

  match.game[i]++;

  if((match.game[i]>=4)&&Math.abs(match.game[i]-match.game[o])>=2){
    match.set[i]++;
    match.game=[0,0];
    server=sw(server);

    if(match.set[0]===6 && match.set[1]===6){
      tiebreak=true;
      tb=[0,0];
      tbCount=0;
    }

    if(match.set[i]>=6 && Math.abs(match.set[0]-match.set[1])>=2){
      match.finished=true;
    }
  }

  servePhase=1;
  state="type";
  updateScore();
  render();
}

// ===== 開始 =====
function start(){
  info.mySchool=document.getElementById("mySchool").value;
  info.oppSchool=document.getElementById("oppSchool").value;
  info.myName=document.getElementById("myName").value;
  info.oppName=document.getElementById("oppName").value;

  state="type";
  updateScore();
  render();
}

// ===== 初期 =====
render();

</script>
</body>
</html>
