<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:200px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={};

let server="me";
let servePhase=1;

// ===== サーブ統計 =====
let serveStats={
  me:{total:0,firstIn:0,df:0},
  opponent:{total:0,firstIn:0,df:0}
};

// ===== スコア =====
let match={set:[0,0],game:[0,0],finished:false};

// ===== タイブレーク =====
let tiebreak=false;
let tb=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

// ===== 共通 =====
function sw(p){ return p==="me"?"opponent":"me"; }
function name(p){ return p==="me"?info.myName:info.oppName; }

// ===== UI =====
function render(){
  const app=appEl,ctrl=ctrlEl;

  if(state==="setup"){
    app.innerHTML=`
    <input id="mySchool"><br>
    <input id="oppSchool"><br>
    <input id="myName"><br>
    <input id="oppName"><br>
    <button onclick="setFirst('me')">自分サーブ</button>
    <button onclick="setFirst('opponent')">相手サーブ</button>`;
    ctrl.innerHTML=`<button onclick="start()">開始</button>`;
    return;
  }

  if(state==="type"){
    ctrl.innerHTML=`
    <button onclick="type('SA')">SA</button>
    <button onclick="type('F')">フォルト</button>
    <button onclick="type('R')">ラリー</button>`;
  }

  if(state==="cause"){
    ctrl.innerHTML=`
    <button onclick="cause('me')">自分</button>
    <button onclick="cause('opponent')">相手</button>`;
  }

  if(state==="rally"){
    if(step===0){
      ctrl.innerHTML=`<button onclick="detail('F')">フォア</button><button onclick="detail('B')">バック</button>`;
    }else if(step===1){
      ctrl.innerHTML=`<button onclick="detail('S')">ストローク</button><button onclick="detail('V')">ボレー</button>`;
    }else{
      ctrl.innerHTML=`
      <button onclick="detail('O')">アウト</button>
      <button onclick="detail('N')">ネット</button>
      <button onclick="detail('A')">エース</button>`;
    }
  }

  // 白部分
  app.innerHTML=`
  <h3>${name(server)} サーブ</h3>
  <p>${servePhase===1?"1stサーブ":"2ndサーブ"}</p>
  `;
}

// ===== スコア表示 =====
function scoreText(){
  if(tiebreak) return tb[0]+"-"+tb[1];

  let a=match.game[0],b=match.game[1];

  if(a>=3 && b>=3){
    if(a===b) return "デュース";
    return a>b ? "Ad "+info.myName : "Ad "+info.oppName;
  }
  return pointMap[a]+"-"+pointMap[b];
}

function updateScore(){
  score.innerHTML=`
  ${info.mySchool} ${info.myName}
  vs
  ${info.oppSchool} ${info.oppName}<br>
  ${match.set[0]}-${match.set[1]} |
  ${scoreText()}
  `;
}

// ===== 開始 =====
function setFirst(p){ info.firstServer=p; }
function start(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";
  updateScore();
  render();
}

// ===== 入力 =====
function type(t){

  if(t==="SA"){
    serveStats[server].total++;
    serveStats[server].firstIn++;
    point(server);
    return;
  }

  if(t==="F"){
    if(servePhase===1){
      servePhase=2;
      render();
      return;
    }
    serveStats[server].total++;
    serveStats[server].df++;
    point(sw(server));
    return;
  }

  state="cause";
  render();
}

let step=0;
let causeP;

function cause(p){
  causeP=p;
  step=0;
  state="rally";
  render();
}

function detail(v){
  if(step===2){
    let winner = v==="A"?causeP:sw(causeP);
    point(winner);

    // ★1回で戻る（修正）
    state="type";
    step=0;
    render();
    return;
  }
  step++;
  render();
}

// ===== 得点 =====
function point(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tb[i]++;
    tbCount++;

    if(tbCount===1 || tbCount%2===1){
      server=sw(server);
    }

    if(tb[i]>=7 && tb[i]-tb[o]>=2){
      match.set[i]++;
      match.finished=true;
    }

    updateScore();
    return;
  }

  match.game[i]++;

  let a=match.game[0],b=match.game[1];

  if((a>=4||b>=4)&&Math.abs(a-b)>=2){
    match.set[i]++;
    match.game=[0,0];
    server=sw(server);

    if(match.set[0]===6 && match.set[1]===6){
      tiebreak=true;
      tb=[0,0];
      tbCount=0;
    }

    if(match.set[i]>=6 && Math.abs(match.set[0]-match.set[1])>=2){
      match.finished=true;
    }
  }

  updateScore();
}

// ===== 初期 =====
const appEl=document.getElementById("app");
const ctrlEl=document.getElementById("controls");
render();

</script>
</body>
</html>
