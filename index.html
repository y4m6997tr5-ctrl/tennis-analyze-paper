<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:200px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button { width:80%; padding:16px; margin:6px; font-size:18px; }
input { width:80%; padding:14px; margin:8px; font-size:18px; }

table { border-collapse:collapse; width:100%; font-size:12px; }
td,th { border:1px solid black; padding:4px; text-align:center; }
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
const app=document.getElementById("app");
const controls=document.getElementById("controls");
const score=document.getElementById("score");

let info={mySchool:"",oppSchool:"",myName:"",oppName:""};
let state="setup",server="me",servePhase=1;

let match={set:[0,0],game:[0,0],finished:false};

let tiebreak=false,tb=[0,0],tbCount=0;
const pointMap=[0,15,30,40];

let current={};
let data=[];
let isSecondServe=false;

// ===== 共通 =====
function sw(p){return p==="me"?"opponent":"me";}
function nameFull(p){
  return p==="me"
  ? info.mySchool+" "+info.myName
  : info.oppSchool+" "+info.oppName;
}

// ===== UI =====
function render(){

  if(state==="setup"){
    app.innerHTML=`
    <input id="mySchool" placeholder="自校名"><br>
    <input id="oppSchool" placeholder="相手校名"><br>
    <input id="myName" placeholder="自分の名前"><br>
    <input id="oppName" placeholder="相手の名前"><br>
    `;
    controls.innerHTML=`<button id="startBtn">試合開始</button>`;
    startBtn.onclick=start;
    return;
  }

  if(match.finished){
    app.innerHTML=renderSheet();
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button id="sa">SA</button>
      <button id="fault">フォルト</button>
      <button id="rally">ラリー</button>
    `;
    sa.onclick=()=>type("SA");
    fault.onclick=()=>type("F");
    rally.onclick=()=>type("R");
  }

  else if(state==="cause"){
    controls.innerHTML=`
      <button id="me">${nameFull("me")}</button>
      <button id="op">${nameFull("opponent")}</button>
    `;
    me.onclick=()=>{current.player="me";next("side");};
    op.onclick=()=>{current.player="opponent";next("side");};
  }

  else if(state==="side"){
    controls.innerHTML=`
      <button id="f">フォア</button>
      <button id="b">バック</button>
    `;
    f.onclick=()=>{current.side="F";next("style");};
    b.onclick=()=>{current.side="B";next("style");};
  }

  else if(state==="style"){
    controls.innerHTML=`
      <button id="s">ストローク</button>
      <button id="v">ボレー</button>
    `;
    s.onclick=()=>{current.style="S";next("result");};
    v.onclick=()=>{current.style="V";next("result");};
  }

  else if(state==="result"){
    controls.innerHTML=`
      <button id="o">アウト</button>
      <button id="n">ネット</button>
      <button id="a">エース</button>
    `;
    o.onclick=()=>finish("O");
    n.onclick=()=>finish("N");
    a.onclick=()=>finish("A");
  }

  app.innerHTML=`
  <h3>${nameFull(server)} サーブ</h3>
  <p>${servePhase===1?"1st":"2nd"}サーブ</p>
  `;
}

function next(s){state=s;render();}

// ===== 入力 =====
function type(t){

  if(t==="SA"){
    record(server,"SA",{second:isSecondServe});
    isSecondServe=false;
    point(server);
    return;
  }

  if(t==="F"){
    if(servePhase===1){
      servePhase=2;
      isSecondServe=true;
      render();
      return;
    }
    record(server,"DF",{second:true});
    isSecondServe=false;
    point(sw(server));
    return;
  }

  current={};
  current.second=isSecondServe;
  isSecondServe=false;

  state="cause";
  render();
}

// ===== ラリー =====
function finish(r){
  current.result=r;

  let winner=(r==="A")?current.player:sw(current.player);

  record(winner,"R",{
    player: current.player,
    side: current.side,
    style: current.style,
    result: r,
    second: current.second
  });

  point(winner);
}

// ===== 記録 =====
function record(winner,type,detail={}){
  data.push({
    winner,
    server,
    type,
    detail,
    set:[...match.set]
  });
}

// ===== スコア =====
function scoreText(){
  if(tiebreak) return tb[0]+"-"+tb[1];

  let a=match.game[0],b=match.game[1];

  if(a>=3&&b>=3){
    if(a===b)return"デュース";
    return a>b?"Ad "+info.myName:"Ad "+info.oppName;
  }
  return pointMap[a]+"-"+pointMap[b];
}

function updateScore(){
  score.innerHTML=`
  ${info.mySchool} ${info.myName} vs ${info.oppSchool} ${info.oppName}<br>
  ゲーム ${match.set[0]}-${match.set[1]} |
  ポイント ${scoreText()}
  `;
}

// ===== 得点 =====
function point(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tb[i]++;
    tbCount++;
    if(tbCount===1||tbCount%2===1) server=sw(server);

    if(tb[i]>=7&&tb[i]-tb[o]>=2){
      match.set[i]++;
      match.finished=true;
    }

    servePhase=1; state="type";
    updateScore(); render(); return;
  }

  match.game[i]++;

  if((match.game[i]>=4)&&Math.abs(match.game[i]-match.game[o])>=2){
    match.set[i]++;
    match.game=[0,0];
    server=sw(server);

    if(match.set[0]===6&&match.set[1]===6){
      tiebreak=true; tb=[0,0]; tbCount=0;
    }

    if(match.set[i]>=6&&Math.abs(match.set[0]-match.set[1])>=2){
      match.finished=true;
    }
  }

  servePhase=1; state="type";
  updateScore(); render();
}

// ===== 分析シート =====
function renderSheet(){

  let games={};
  let pointIndex={};

  data.forEach(d=>{

    let g=d.set[0]+d.set[1]+1;

    if(!games[g]){
      games[g]={meP:[],meM:[],opP:[],opM:[],score:"",serveTotal:0,serveFirst:0,serveWF:0};
      pointIndex[g]=1;
    }

    let num=pointIndex[g]++;
    let circled=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"][num-1]||num;

    let mark="";

    if(d.type==="SA") mark="SA";
    else if(d.type==="DF") mark="WF";
    else{
      let dt=d.detail||{};
      mark=(dt.side||"")+(dt.style||"")+(dt.result||"");
    }

    // ★ 特別ルール：WFは’なし
    if(d.detail && d.detail.second && d.type!=="DF"){
      mark="’"+mark;
    }

    mark=circled+mark;

    // ===== ルール② =====
    if(d.type==="R"){
      let p=d.detail.player;
      let r=d.detail.result;

      if(p==="me"){
        if(r==="A") games[g].meP.push(mark);
        else games[g].meM.push(mark);
      }else{
        if(r==="A") games[g].opP.push(mark);
        else games[g].opM.push(mark);
      }

      if(r==="N"||r==="O"){
        if(p==="opponent") games[g].meP.push(mark);
        else games[g].opP.push(mark);
      }
    }

    else if(d.type==="SA"){
      if(d.server==="me") games[g].meP.push(mark);
      else games[g].opP.push(mark);
    }

    else if(d.type==="DF"){
      if(d.server==="me") games[g].meM.push(mark);
      else games[g].opM.push(mark);
    }

    // ★ ルール⑤：そのゲームの「最後の記録」を採用
    games[g].score=`${d.set[0]}-${d.set[1]}`;

    if(d.server==="me"){
      games[g].serveTotal++;
      if(d.type==="SA") games[g].serveFirst++;
      if(d.type==="DF") games[g].serveWF++;
    }

  });

  let html=`
  <table>
    <tr>
      <th colspan="8">分析シート [　　　　　]　大会名：[　　　　　]</th>
    </tr>
    <tr>
      <th rowspan="2">ゲーム</th>
      <th colspan="2">${info.mySchool}<br>${info.myName}</th>
      <th rowspan="2">スコア</th>
      <th colspan="2">${info.oppSchool}<br>${info.oppName}</th>
      <th rowspan="2">1st%</th>
      <th rowspan="2">WF%</th>
    </tr>
    <tr>
      <th>P</th><th>M</th>
      <th>P</th><th>M</th>
    </tr>
  `;

  for(let i=1;i<=8;i++){
    let g=games[i]||{meP:[],meM:[],opP:[],opM:[],score:"",serveTotal:0,serveFirst:0,serveWF:0};

    let first=g.serveTotal?Math.round(g.serveFirst/g.serveTotal*100):"";
    let wf=g.serveTotal?Math.round(g.serveWF/g.serveTotal*100):"";

    html+=`
    <tr>
      <td>${i}</td>
      <td>${g.meP.join("<br>")}</td>
      <td>${g.meM.join("<br>")}</td>
      <td>${g.score||"—"}</td>
      <td>${g.opP.join("<br>")}</td>
      <td>${g.opM.join("<br>")}</td>
      <td>${first!==""?first+"%":""}</td>
      <td>${wf!==""?wf+"%":""}</td>
    </tr>`;
  }

  html+="</table>";
  return html;
}

// ===== 開始 =====
function start(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  state="type";
  updateScore(); render();
}

// ===== 初期 =====
render();

</script>
</body>
</html>
