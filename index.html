<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }
#score { position: fixed; top: 0; width: 100%; background: black; color: white; padding: 12px; text-align: center; }
#app { padding-top: 100px; padding-bottom: 180px; text-align: center; }
#controls { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 15px 0; text-align: center; }
button { width: 70%; padding: 18px; margin: 6px; font-size: 18px; }
input { width: 80%; padding: 10px; margin: 5px; font-size: 16px; }
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本情報 =====
let info = {
  mySchool:"", oppSchool:"",
  myName:"", oppName:"",
  firstServer:"me"
};

let state="setup";
let current={};
let data=JSON.parse(localStorage.getItem("tennisData")||"[]");

// ===== サーブ =====
let server="me";
let servePhase=1;

// ===== ゲーム内ポイント番号 =====
let gamePointIndex=0;

// ===== スコア =====
let match = {
  currentSet:[0,0],
  currentGame:[0,0],
  finished:false
};

const pointMap=[0,15,30,40];

// ===== プレイヤー表示 =====
function label(p){
  return p==="me"
    ? `${info.mySchool}/${info.myName}`
    : `${info.oppSchool}/${info.oppName}`;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分の名前"><br>
      <input id="oppName" placeholder="相手の名前"><br>
      <button onclick="setFirstServer('me')">自分サーブ</button>
      <button onclick="setFirstServer('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML=`
      <h2>試合終了</h2>
      <textarea style="width:95%;height:300px;">${generateCSV()}</textarea><br>
      <button onclick="downloadCSV()">CSVダウンロード</button>
    `;
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">サービスエース</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }
  else if(state==="cause"){
    controls.innerHTML=`
      <button onclick="setCause('me')">${label("me")}</button>
      <button onclick="setCause('opponent')">${label("opponent")}</button>
    `;
  }
  else if(state==="rally1"){
    controls.innerHTML=`
      <button onclick="setDetail('side','F')">フォア</button>
      <button onclick="setDetail('side','B')">バック</button>
    `;
  }
  else if(state==="rally2"){
    controls.innerHTML=`
      <button onclick="setDetail('style','S')">ストローク</button>
      <button onclick="setDetail('style','V')">ボレー</button>
    `;
  }
  else if(state==="rally3"){
    controls.innerHTML=`
      <button onclick="setDetail('result','O')">アウト</button>
      <button onclick="setDetail('result','N')">ネット</button>
      <button onclick="setDetail('result','A')">エース</button>
    `;
  }

  app.innerHTML=`
    <h3>サーバー: ${label(server)}</h3>
    <p>${servePhase===1?"1st":"2nd"}</p>
  `;
}

// ===== 試合開始 =====
function setFirstServer(s){ info.firstServer=s; }

function startMatch(){
  info.mySchool=document.getElementById("mySchool").value;
  info.oppSchool=document.getElementById("oppSchool").value;
  info.myName=document.getElementById("myName").value;
  info.oppName=document.getElementById("oppName").value;

  server=info.firstServer;
  state="type";
  render();
}

// ===== 入力 =====
function handleType(t){
  current={ type:t, servePhase };

  if(t==="F"){ handleFault(); return; }

  if(t==="SA"){
    pointWon(server);
    save(server,"SA");
    return;
  }

  current.detail={};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){
  if(servePhase===1){
    servePhase=2;
    save(server,"'");
    return;
  }

  let opp=server==="me"?"opponent":"me";
  pointWon(opp);
  save(server,"WF");
}

// ===== ラリー =====
function setCause(p){ current.causePlayer=p; state="rally1"; render(); }

function setDetail(k,v){
  current.detail[k]=v;

  if(state==="rally1") state="rally2";
  else if(state==="rally2") state="rally3";
  else{
    decide(current.causePlayer,current.detail.result);
    save(current.causePlayer,null);
    return;
  }

  render();
}

// ===== 判定 =====
function decide(p,r){
  let opp=p==="me"?"opponent":"me";
  if(r==="A") pointWon(p);
  else pointWon(opp);
}

// ===== 保存 =====
function save(actor,mark){

  gamePointIndex++;

  let player = label(actor || server);

  let actionType="";

  if(mark==="SA") actionType="SA";
  else if(mark==="WF") actionType="WF";
  else if(mark==="'") actionType="'";
  else if(current.detail){
    let d=current.detail;
    actionType=(servePhase===2?"'":"")+d.side+d.style+d.result;
  }

  data.push({
    player,
    actionIndex:gamePointIndex,
    actionType,
    time:new Date().toISOString()
  });

  localStorage.setItem("tennisData",JSON.stringify(data));

  if(mark!=="'") servePhase=1;

  state="type";
  render();
}

// ===== スコア =====
function pointWon(player){
  let p=player==="me"?0:1;
  let o=p===0?1:0;

  match.currentGame[p]++;

  if(match.currentGame[p]>=4 && match.currentGame[p]-match.currentGame[o]>=2){
    gameWon(p);
  }

  updateScore();
}

function gameWon(p){
  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;

  // ★ここでサーブ交代
  server = server==="me"?"opponent":"me";

  if(match.currentSet[p]>=6){
    match.finished=true;
    render();
  }
}

// ===== 表示 =====
function getScore(){
  let p=match.currentGame;

  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1] ? "Ad 自分" : "Ad 相手";
  }

  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  document.getElementById("score").innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}
  `;
}

// ===== CSV =====
function generateCSV(){
  let csv="player,actionIndex,actionType,time\n";
  data.forEach(d=>{
    csv+=`${d.player},${d.actionIndex},${d.actionType},${d.time}\n`;
  });
  return csv;
}

function downloadCSV(){
  let blob=new Blob([generateCSV()],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tennis.csv";
  a.click();
}

// ===== 初期 =====
render();
updateScore();

</script>

</body>
</html>
