<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; text-align: center; margin:0; }

#score {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  color: white;
  padding: 10px;
  font-size: 18px;
}

#app {
  padding-top: 80px;
  padding-bottom: 140px;
}

#controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #eee;
  padding: 10px;
}

button {
  width: 80%;
  padding: 18px;
  margin: 8px;
  font-size: 18px;
}

</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 状態 =====
let state = "start";
let current = {};
let data = JSON.parse(localStorage.getItem("tennisData") || "[]");

// ===== 試合 =====
let match = {
  sets: [0,0],
  currentSet: [0,0],
  currentGame: [0,0],
  tiebreak: false,
  tiebreakPoints: [0,0],
  finished: false
};

const pointMap = [0,15,30,40];

// ===== UI =====
function render(){
  const app = document.getElementById("app");
  const controls = document.getElementById("controls");

  // 試合終了画面
  if(match.finished){
    app.innerHTML = `
      <h2>試合終了</h2>
      <h3>${match.sets[0]} - ${match.sets[1]}</h3>
    `;

    controls.innerHTML = `
      <button onclick="showCSV()">分析シートを見る</button>
    `;
    return;
  }

  // 通常フロー
  if(state==="start"){
    controls.innerHTML = `<button onclick="next('point')">試合開始</button>`;
  }

  else if(state==="point"){
    controls.innerHTML = `
      <button onclick="setWinner('me')">自分</button>
      <button onclick="setWinner('opponent')">相手</button>
    `;
  }

  else if(state==="type"){
    controls.innerHTML = `
      <button onclick="setType('SA')">SA</button>
      <button onclick="setType('Rally')">Rally</button>
    `;
  }

  else if(state==="rally1"){
    controls.innerHTML = `
      <button onclick="setDetail('side','F')">F</button>
      <button onclick="setDetail('side','B')">B</button>
    `;
  }

  else if(state==="rally2"){
    controls.innerHTML = `
      <button onclick="setDetail('style','S')">S</button>
      <button onclick="setDetail('style','V')">V</button>
    `;
  }

  else if(state==="rally3"){
    controls.innerHTML = `
      <button onclick="setDetail('result','O')">O</button>
      <button onclick="setDetail('result','N')">N</button>
    `;
  }

  app.innerHTML = "";
}

// ===== 状態遷移 =====
function next(s){ state=s; render(); }

function setWinner(w){
  current = { winner:w };
  next("type");
}

function setType(t){
  current.type = t;

  if(t==="SA") save();
  else{
    current.detail = {};
    next("rally1");
  }
}

function setDetail(key,val){
  current.detail[key]=val;

  if(state==="rally1") next("rally2");
  else if(state==="rally2") next("rally3");
  else if(state==="rally3") save();
}

// ===== 保存 =====
function save(){
  current.time = new Date().toISOString();
  data.push(current);
  localStorage.setItem("tennisData", JSON.stringify(data));

  pointWon(current.winner);

  state="point";
  render();
}

// ===== スコア =====
function pointWon(player){
  let p = player==="me"?0:1;
  let o = p===0?1:0;

  if(match.tiebreak){
    match.tiebreakPoints[p]++;

    if(match.tiebreakPoints[p]>=7 && match.tiebreakPoints[p]-match.tiebreakPoints[o]>=2){
      gameWon(p);
      match.tiebreak=false;
      match.tiebreakPoints=[0,0];
    }
  }else{
    match.currentGame[p]++;

    if(match.currentGame[p]>=4 && match.currentGame[p]-match.currentGame[o]>=2){
      gameWon(p);
    }
  }

  updateScore();
}

function gameWon(p){
  let o = p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    match.tiebreak=true;
    return;
  }

  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    setWon(p);
  }
}

function setWon(p){
  match.sets[p]++;
  match.currentSet=[0,0];

  if(match.sets[p]===2){
    match.finished = true;
  }
}

// ===== 表示 =====
function getScore(){
  let p = match.currentGame;

  let pointText;

  if(match.tiebreak){
    pointText = `${match.tiebreakPoints[0]}-${match.tiebreakPoints[1]}`;
  }
  else if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) pointText="デュース";
    else if(p[0]>p[1]) pointText="Ad 自分";
    else pointText="Ad 相手";
  }else{
    pointText = `${pointMap[p[0]]}-${pointMap[p[1]]}`;
  }

  return `
  セット ${match.sets[0]}-${match.sets[1]} |
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${pointText}
  `;
}

function updateScore(){
  document.getElementById("score").innerHTML = getScore();
}

// ===== CSV =====
function showCSV(){
  let csv = "winner,type,detail,time\n";

  data.forEach(d=>{
    let detail = d.detail ? JSON.stringify(d.detail) : "";
    csv += `${d.winner},${d.type},"${detail}",${d.time}\n`;
  });

  document.getElementById("app").innerHTML = `
    <textarea style="width:95%;height:300px;">${csv}</textarea>
    <br>
    <button onclick="downloadCSV()">ダウンロード</button>
  `;
}

function downloadCSV(){
  let blob = new Blob([document.querySelector("textarea").value], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tennis.csv";
  a.click();
}

// ===== 初期化 =====
render();
updateScore();

</script>

</body>
</html>
