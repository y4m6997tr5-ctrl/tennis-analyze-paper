<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top: 0;
  width: 100%;
  background: black;
  color: white;
  padding: 12px;
  font-size: 16px;
  text-align: center;
}

#app {
  padding-top: 100px;
  padding-bottom: 180px;
  text-align: center;
}

#controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #eee;
  padding: 15px 0;
  text-align: center;
}

button {
  width: 70%;
  padding: 18px;
  margin: 6px;
  font-size: 18px;
}

input {
  width: 80%;
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 試合前情報 =====
let info = {
  mySchool: "",
  oppSchool: "",
  myName: "",
  oppName: "",
  firstServer: "me"
};

// ===== 状態 =====
let state = "setup";
let current = {};
let data = JSON.parse(localStorage.getItem("tennisData") || "[]");

// ===== サーブ =====
let server = "me";
let serveCount = 0;

// ===== フォルト =====
let faultCount = { me:0, opponent:0 };

// ===== スコア =====
let match = {
  sets:[0,0],
  currentSet:[0,0],
  currentGame:[0,0],
  tiebreak:false,
  tiebreakPoints:[0,0],
  finished:false
};

const pointMap = [0,15,30,40];

// ===== UI =====
function render(){
  const app = document.getElementById("app");
  const controls = document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML = `
      <h3>試合設定</h3>
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分の名前"><br>
      <input id="oppName" placeholder="相手の名前"><br>
      <p>最初のサーバー</p>
      <button onclick="setFirstServer('me')">自分</button>
      <button onclick="setFirstServer('opponent')">相手</button>
    `;
    controls.innerHTML = `<button onclick="startMatch()">試合開始</button>`;
    return;
  }

  if(match.finished){
    let csv = generateCSV();

    app.innerHTML = `
      <h2>試合終了</h2>
      <h3>${match.sets[0]} - ${match.sets[1]}</h3>
      <textarea style="width:95%;height:300px;">${csv}</textarea>
      <br>
      <button onclick="downloadCSV()">CSVダウンロード</button>
    `;
    controls.innerHTML = "";
    return;
  }

  if(state==="type"){
    controls.innerHTML = `
      <button onclick="handleType('SA')">SA</button>
      <button onclick="handleType('F')">F</button>
      <button onclick="handleType('Rally')">Rally</button>
      <button onclick="undo()">戻る</button>
    `;
  }

  else if(state==="cause"){
    controls.innerHTML = `
      <button onclick="setCause('me')">自分</button>
      <button onclick="setCause('opponent')">相手</button>
    `;
  }

  else if(state==="rally1"){
    controls.innerHTML = `
      <button onclick="setDetail('side','F')">F</button>
      <button onclick="setDetail('side','B')">B</button>
    `;
  }

  else if(state==="rally2"){
    controls.innerHTML = `
      <button onclick="setDetail('style','S')">S</button>
      <button onclick="setDetail('style','V')">V</button>
    `;
  }

  else if(state==="rally3"){
    controls.innerHTML = `
      <button onclick="setDetail('result','O')">O</button>
      <button onclick="setDetail('result','N')">N</button>
      <button onclick="setDetail('result','A')">A</button>
    `;
  }

  app.innerHTML = `<h3>サーバー: ${server==="me"?"自分":"相手"}</h3>`;
}

// ===== 試合開始 =====
function setFirstServer(s){ info.firstServer = s; }

function startMatch(){
  info.mySchool = document.getElementById("mySchool").value;
  info.oppSchool = document.getElementById("oppSchool").value;
  info.myName = document.getElementById("myName").value;
  info.oppName = document.getElementById("oppName").value;

  server = info.firstServer;
  state="type";
  render();
}

// ===== タイプ =====
function handleType(t){
  current = { type:t };

  if(t==="F"){ handleFault(); return; }

  if(t==="SA"){
    faultCount[server]=0;
    pointWon(server);
    save(server);
    return;
  }

  current.detail = {};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){
  faultCount[server]++;

  if(faultCount[server]===1){
    save(null,"'");
    state="type";
    render();
  }else{
    let opp = server==="me"?"opponent":"me";
    pointWon(opp);
    save(opp,"DF");
    faultCount[server]=0;
  }
}

// ===== ラリー =====
function setCause(p){
  current.causePlayer = p;
  state="rally1";
  render();
}

function setDetail(k,v){
  current.detail[k]=v;

  if(state==="rally1") state="rally2";
  else if(state==="rally2") state="rally3";
  else{
    let winner = decidePoint(current.causePlayer, current.detail.result);
    save(winner);
    return;
  }

  render();
}

// ===== 得点判定 =====
function decidePoint(p, result){
  let opp = p==="me"?"opponent":"me";

  if(result==="A"){
    pointWon(p);
    return p;
  }else{
    pointWon(opp);
    return opp;
  }
}

// ===== 保存 =====
function save(winner, mark=null){
  current.winner = winner;
  current.mark = mark;
  current.server = server;
  current.time = new Date().toISOString();

  // ★分析用データ
  current.stroke = current.detail?.side || null;
  current.position = current.detail?.style || null;
  current.result = current.detail?.result || null;

  data.push(current);
  localStorage.setItem("tennisData", JSON.stringify(data));

  nextServe();
  state="type";
  render();
}

// ===== サーブ交代 =====
function nextServe(){
  if(match.tiebreak){
    serveCount++;

    if(
      (match.tiebreakPoints[0] + match.tiebreakPoints[1] === 1) ||
      (serveCount === 2)
    ){
      server = server==="me"?"opponent":"me";
      serveCount = 0;
    }
  }
}

// ===== スコア =====
function pointWon(player){
  let p = player==="me"?0:1;
  let o = p===0?1:0;

  if(match.tiebreak){
    match.tiebreakPoints[p]++;
    if(match.tiebreakPoints[p]>=7 && match.tiebreakPoints[p]-match.tiebreakPoints[o]>=2){
      gameWon(p);
      match.tiebreak=false;
      match.tiebreakPoints=[0,0];
    }
  }else{
    match.currentGame[p]++;
    if(match.currentGame[p]>=4 && match.currentGame[p]-match.currentGame[o]>=2){
      gameWon(p);
    }
  }

  updateScore();
}

function gameWon(p){
  let o = p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];

  // ★ゲームごとにサーブ交代
  server = server==="me"?"opponent":"me";
  serveCount = 0;

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    match.tiebreak=true;
    return;
  }

  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    setWon(p);
  }
}

function setWon(p){
  match.sets[p]++;
  match.currentSet=[0,0];

  if(match.sets[p]===2){
    match.finished=true;
    render();
  }
}

// ===== 表示 =====
function getScore(){
  let p = match.currentGame;
  let pointText;

  if(match.tiebreak){
    pointText = `${match.tiebreakPoints[0]}-${match.tiebreakPoints[1]}`;
  }
  else if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) pointText="デュース";
    else if(p[0]>p[1]) pointText="Ad 自分";
    else pointText="Ad 相手";
  }else{
    pointText = `${pointMap[p[0]]}-${pointMap[p[1]]}`;
  }

  return `
  ${info.myName} vs ${info.oppName}<br>
  セット ${match.sets[0]}-${match.sets[1]} |
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${pointText}
  `;
}

function updateScore(){
  if(state==="setup") return;
  document.getElementById("score").innerHTML = getScore();
}

// ===== CSV =====
function generateCSV(){
  let csv="type,causePlayer,winner,mark,server,stroke,position,result,time\n";
  data.forEach(d=>{
    csv+=`${d.type},${d.causePlayer||""},${d.winner||""},${d.mark||""},${d.server},${d.stroke||""},${d.position||""},${d.result||""},${d.time}\n`;
  });
  return csv;
}

function downloadCSV(){
  let blob=new Blob([generateCSV()],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tennis.csv";
  a.click();
}

// ===== Undo =====
function undo(){
  if(data.length===0) return;
  data.pop();
  localStorage.setItem("tennisData", JSON.stringify(data));
  location.reload();
}

// ===== 初期 =====
render();
updateScore();

</script>

</body>
</html>
