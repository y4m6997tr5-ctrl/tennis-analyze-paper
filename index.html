<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:180px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
  font-size:16px;
}

table {
  border-collapse: collapse;
  width:100%;
  font-size:12px;
}

td, th {
  border:1px solid black;
  padding:4px;
  text-align:center;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;

let gamePointIndex=0;
let gameNumber=1;

// ===== 統計 =====
let stats={
  me:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0},
  opponent:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0}
};

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};

// ===== タイブレーク =====
let tiebreak=false;
let tbPoints=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

// ===== 共通 =====
function switchPlayer(p){ return p==="me"?"opponent":"me"; }
function label(p){
  return p==="me"
    ? `${info.mySchool}/${info.myName}`
    : `${info.oppSchool}/${info.oppName}`;
}

// ===== 丸数字 =====
function toCircle(n){
  const nums=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
              "⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
  return nums[n-1]||n;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分の名前"><br>
      <input id="oppName" placeholder="相手の名前"><br>
      <button onclick="setFirstServer('me')">自分が最初にサーブ</button>
      <button onclick="setFirstServer('opponent')">相手が最初にサーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">試合開始</button>`;
    return;
  }

  if(match.finished){
    buildSheet();
    app.innerHTML = renderSheet();
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">サービスエース</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }
  else if(state==="cause"){
    controls.innerHTML=`
      <button onclick="setCause('me')">${label("me")}</button>
      <button onclick="setCause('opponent')">${label("opponent")}</button>
    `;
  }
  else if(state==="rally1"){
    controls.innerHTML=`
      <button onclick="setDetail('side','F')">フォア</button>
      <button onclick="setDetail('side','B')">バック</button>
    `;
  }
  else if(state==="rally2"){
    controls.innerHTML=`
      <button onclick="setDetail('style','S')">ストローク</button>
      <button onclick="setDetail('style','V')">ボレー</button>
    `;
  }
  else if(state==="rally3"){
    controls.innerHTML=`
      <button onclick="setDetail('result','O')">アウト</button>
      <button onclick="setDetail('result','N')">ネット</button>
      <button onclick="setDetail('result','A')">エース</button>
    `;
  }

  app.innerHTML=`
    <h3>${label(server)}</h3>
    <p>ゲーム ${match.currentSet[0]}-${match.currentSet[1]}</p>
    <p>${tiebreak?"タイブレーク":(servePhase===1?"1stサーブ":"2ndサーブ")}</p>
  `;
}

// ===== 開始 =====
function setFirstServer(s){ info.firstServer=s; }
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";
  render();
}

// ===== 統計 =====
function serveStart(p){ if(servePhase===1) stats[p].firstServeAttempt++; }
function firstIn(p){ stats[p].firstServeIn++; }
function pointEnd(p){ stats[p].servePoint++; }
function doubleFault(p){ stats[p].doubleFault++; stats[p].servePoint++; }

// ===== 入力 =====
function handleType(t){

  current={type:t,servePhase};

  if(t==="SA"){
    serveStart(server);
    firstIn(server);
    pointEnd(server);
    pointWon(server);
    save(server,"SA");
    return;
  }

  if(t==="F"){ handleFault(); return; }

  serveStart(server);
  if(servePhase===1) firstIn(server);

  current.detail={};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){
  if(!tiebreak && servePhase===1){
    serveStart(server);
    servePhase=2;
    save(server,"'");
    return;
  }

  doubleFault(server);
  let opp=switchPlayer(server);
  pointWon(opp);
  save(server,"WF");
}

// ===== ラリー =====
function setCause(p){ current.causePlayer=p; state="rally1"; render(); }

function setDetail(k,v){
  current.detail[k]=v;

  if(state==="rally1") state="rally2";
  else if(state==="rally2") state="rally3";
  else{
    let winner = decide(current.causePlayer,current.detail.result);
    pointEnd(server);
    save(winner,null);
    return;
  }

  render();
}

// ===== 判定 =====
function decide(p,r){
  let opp=switchPlayer(p);
  if(r==="A"){ pointWon(p); return p; }
  else{ pointWon(opp); return opp; }
}

// ===== 得点 =====
function pointWon(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){
    tbPoints[i]++;
    tbCount++;

    if(tbCount===1 || (tbCount>1 && tbCount%2===1)){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      gameWon(i);
      tiebreak=false;
      tbPoints=[0,0];
      tbCount=0;
    }

  }else{
    match.currentGame[i]++;
    if(match.currentGame[i]>=4 && match.currentGame[i]-match.currentGame[o]>=2){
      gameWon(i);
    }
  }

  updateScore();
}

// ===== ゲーム =====
function gameWon(p){

  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;
  gameNumber++;

  stats={
    me:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0},
    opponent:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0}
  };

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true;
    return;
  }

  if(match.currentSet[p]>=6 && Math.abs(match.currentSet[0]-match.currentSet[1])>=2){
    match.finished=true;
  }

  server=switchPlayer(server);
}

// ===== 表示 =====
function rate(s){
  let first=s.firstServeAttempt?Math.round(s.firstServeIn/s.firstServeAttempt*100):0;
  let df=s.servePoint?Math.round(s.doubleFault/s.servePoint*100):0;
  return `${first}% / ${df}%`;
}

function getScore(){
  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;
  let p=match.currentGame;
  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1]?"Ad 自分":"Ad 相手";
  }
  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  score.innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}<br>
  自:${rate(stats.me)} 相:${rate(stats.opponent)}
  `;
}

// ===== 保存 =====
function save(actor,mark){

  gamePointIndex++;

  let actionType="";

  if(mark==="SA") actionType="SA";
  else if(mark==="WF") actionType="WF";
  else if(mark==="'") actionType="'";
  else{
    let d=current.detail;
    actionType=(current.servePhase===2?"'":"")+d.side+d.style+d.result;
  }

  data.push({
    player:label(actor),
    gameNumber,
    actionIndex:gamePointIndex,
    actionType,
    server:label(server),
    serveRate:rate(stats[server]),
    time:new Date().toISOString()
  });

  if(mark!=="'") servePhase=1;

  state="type";
  render();
}

// ===== シート作成 =====
let sheet={};

function buildSheet(){

  sheet={};

  data.forEach(d=>{

    if(!sheet[d.gameNumber]){
      sheet[d.gameNumber]={
        meP:[], meM:[],
        opP:[], opM:[],
        first:"", wf:""
      };
    }

    let r=sheet[d.gameNumber];
    let text=toCircle(d.actionIndex)+d.actionType;
    let isMe=d.player.includes(info.myName);

    if(d.actionType==="SA"||d.actionType.includes("A")){
      isMe ? r.meP.push(text) : r.opP.push(text);
    }
    else if(d.actionType==="WF"||d.actionType.includes("N")||d.actionType.includes("O")){
      isMe ? r.meM.push(text) : r.opM.push(text);
    }

    if(d.server.includes(info.myName)){
      let sp=d.serveRate.split(" / ");
      r.first=sp[0];
      r.wf=sp[1];
    }

  });
}

// ===== シート表示 =====
function renderSheet(){

  let html=`
  <table>
  <tr>
    <th>ゲーム</th>
    <th colspan="2">${info.mySchool}<br>${info.myName}</th>
    <th colspan="2">${info.oppSchool}<br>${info.oppName}</th>
    <th>1st</th>
    <th>WF</th>
  </tr>
  <tr>
    <th></th>
    <th>P</th><th>M</th>
    <th>P</th><th>M</th>
    <th></th><th></th>
  </tr>
  `;

  Object.keys(sheet).forEach(g=>{
    let r=sheet[g];
    html+=`
    <tr>
      <td>${g}</td>
      <td>${r.meP.join(" ")}</td>
      <td>${r.meM.join(" ")}</td>
      <td>${r.opP.join(" ")}</td>
      <td>${r.opM.join(" ")}</td>
      <td>${r.first}</td>
      <td>${r.wf}</td>
    </tr>
    `;
  });

  html+="</table>";
  return html;
}

// ===== 初期 =====
render();
updateScore();

</script>
</body>
</html>
