<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:200px;
  text-align:center;
}

#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;

let gamePointIndex=0;
let gameNumber=1;

// ===== サーブ統計 =====
let serveStats={
  me:{total:0,firstIn:0,df:0},
  opponent:{total:0,firstIn:0,df:0}
};

// ===== タイブレーク =====
let tiebreak=false;
let tbPoints=[0,0];
let tbServeCount=0;

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};

const pointMap=[0,15,30,40];

// ===== ラリー =====
let rallyIndex=0;

// ===== 共通 =====
function switchPlayer(p){ return p==="me"?"opponent":"me"; }
function label(p){
  return p==="me"
    ? `${info.mySchool}/${info.myName}`
    : `${info.oppSchool}/${info.oppName}`;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分の名前"><br>
      <input id="oppName" placeholder="相手の名前"><br>
      <button onclick="setFirstServer('me')">自分サーブ</button>
      <button onclick="setFirstServer('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML="<h2>試合終了</h2>";
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">SA</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }
  else if(state==="cause"){
    controls.innerHTML=`
      <button onclick="setCause('me')">自分</button>
      <button onclick="setCause('opponent')">相手</button>
    `;
  }
  else if(state==="rally"){
    if(rallyIndex===0){
      controls.innerHTML=`<button onclick="setDetail('F')">フォア</button><button onclick="setDetail('B')">バック</button>`;
    }else if(rallyIndex===1){
      controls.innerHTML=`<button onclick="setDetail('S')">ストローク</button><button onclick="setDetail('V')">ボレー</button>`;
    }else{
      controls.innerHTML=`
        <button onclick="setDetail('O')">アウト</button>
        <button onclick="setDetail('N')">ネット</button>
        <button onclick="setDetail('A')">エース</button>
      `;
    }
  }

  app.innerHTML=`<h3>${label(server)}</h3>`;
}

// ===== 開始 =====
function setFirstServer(s){ info.firstServer=s; }
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";
  updateScore();
  render();
}

// ===== 入力 =====
function handleType(t){
  current={type:t};

  if(t==="SA"){
    serveStats[server].total++;
    serveStats[server].firstIn++;
    recordPoint(server);
    return;
  }

  if(t==="F"){
    handleFault();
    return;
  }

  current.detail=[];
  rallyIndex=0;
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){
  serveStats[server].total++;

  if(servePhase===1){
    servePhase=2;
    render();
    return;
  }

  serveStats[server].df++;
  recordPoint(switchPlayer(server));
}

// ===== ラリー =====
function setCause(p){
  current.causePlayer=p;
  state="rally";
  render();
}

function setDetail(v){
  current.detail.push(v);
  rallyIndex++;

  if(rallyIndex<3){
    render();
    return;
  }

  let result=current.detail[2];

  let winner = result==="A"
    ? current.causePlayer
    : switchPlayer(current.causePlayer);

  recordPoint(winner);

  state="type";
  rallyIndex=0;
}

// ===== 得点処理 =====
function recordPoint(winner){

  let i = winner==="me"?0:1;
  let o = i===0?1:0;

  if(tiebreak){
    tbPoints[i]++;

    tbServeCount++;

    if(tbServeCount===1 || tbServeCount%2===1){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      match.currentSet[i]++;
      match.finished=true;
    }

    updateScore();
    return;
  }

  match.currentGame[i]++;

  let p0=match.currentGame[0];
  let p1=match.currentGame[1];

  if((p0>=4 || p1>=4) && Math.abs(p0-p1)>=2){
    match.currentSet[i]++;
    match.currentGame=[0,0];
    server=switchPlayer(server);

    if(match.currentSet[0]===6 && match.currentSet[1]===6){
      tiebreak=true;
      tbPoints=[0,0];
      tbServeCount=0;
    }

    if(match.currentSet[i]>=6 && Math.abs(match.currentSet[0]-match.currentSet[1])>=2){
      match.finished=true;
    }
  }

  updateScore();
}

// ===== スコア =====
function getPointScore(){
  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;

  let p=match.currentGame;

  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "Deuce";
    return p[0]>p[1]?"Ad":"Ad Opp";
  }

  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  score.innerHTML=`
    ${info.mySchool} vs ${info.oppSchool}<br>
    ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
    ポイント ${getPointScore()}
  `;
}

// ===== 初期 =====
render();

</script>
</body>
</html>
