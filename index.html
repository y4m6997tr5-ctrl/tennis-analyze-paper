<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }
#score { position: fixed; top: 0; width: 100%; background: black; color: white; padding: 12px; text-align: center; }
#app { padding-top: 110px; padding-bottom: 180px; text-align: center; }
#controls { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 15px 0; }
button { width: 80%; padding: 16px; margin: 6px; font-size: 16px; }
input { width: 80%; padding: 10px; margin: 5px; }
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;

let gamePointIndex=0;

// ===== 統計（自分のみ） =====
let stats={
  firstServeAttempt:0,
  firstServeIn:0,
  doubleFault:0,
  servePoint:0
};

// ===== スコア =====
let match={
  currentSet:[0,0],
  currentGame:[0,0],
  finished:false
};

// ===== タイブレーク =====
let tiebreak=false;
let tbPoints=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

// ===== 共通 =====
function switchPlayer(p){ return p==="me"?"opponent":"me"; }
function label(p){
  return p==="me"
    ? `${info.mySchool}/${info.myName}`
    : `${info.oppSchool}/${info.oppName}`;
}

// ===== UI =====
function render(){
  const app=appDiv();
  const controls=ctrlDiv();

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="自分"><br>
      <input id="oppName" placeholder="相手"><br>
      <button onclick="setFirstServer('me')">自分サーブ</button>
      <button onclick="setFirstServer('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML=`<textarea style="width:95%;height:300px;">${generateCSV()}</textarea>`;
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">サービスエース</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }
  else if(state==="cause"){
    controls.innerHTML=`
      <button onclick="setCause('me')">${label("me")}</button>
      <button onclick="setCause('opponent')">${label("opponent")}</button>
    `;
  }
  else if(state==="rally1"){
    controls.innerHTML=`
      <button onclick="setDetail('side','F')">フォア</button>
      <button onclick="setDetail('side','B')">バック</button>
    `;
  }
  else if(state==="rally2"){
    controls.innerHTML=`
      <button onclick="setDetail('style','S')">ストローク</button>
      <button onclick="setDetail('style','V')">ボレー</button>
    `;
  }
  else if(state==="rally3"){
    controls.innerHTML=`
      <button onclick="setDetail('result','O')">アウト</button>
      <button onclick="setDetail('result','N')">ネット</button>
      <button onclick="setDetail('result','A')">エース</button>
    `;
  }

  app.innerHTML=`
    <h3>${label(server)}</h3>
    <p>${tiebreak?"TB":(servePhase===1?"1st":"2nd")}</p>
  `;
}

function appDiv(){ return document.getElementById("app"); }
function ctrlDiv(){ return document.getElementById("controls"); }

// ===== 試合開始 =====
function setFirstServer(s){info.firstServer=s;}
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type"; render();
}

// ===== 入力 =====
function handleType(t){

  current={type:t,servePhase};

  // SA
  if(t==="SA"){
    if(server==="me"){
      if(servePhase===1){
        stats.firstServeAttempt++;
        stats.firstServeIn++;
      }
      stats.servePoint++;
    }
    pointWon(server);
    save(server,"SA");
    return;
  }

  // フォルト
  if(t==="F"){ handleFault(); return; }

  // ラリー開始（1st成功）
  if(server==="me" && servePhase===1){
    stats.firstServeAttempt++;
    stats.firstServeIn++;
  }

  current.detail={};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){

  if(!tiebreak && servePhase===1){
    if(server==="me"){
      stats.firstServeAttempt++;
    }
    servePhase=2;
    save(server,"'");
    return;
  }

  let opp=switchPlayer(server);

  if(server==="me"){
    stats.doubleFault++;
    stats.servePoint++;
  }

  pointWon(opp);
  save(server,"WF");
}

// ===== ラリー =====
function setCause(p){current.causePlayer=p;state="rally1";render();}
function setDetail(k,v){
  current.detail[k]=v;

  if(state==="rally1") state="rally2";
  else if(state==="rally2") state="rally3";
  else{
    decide(current.causePlayer,current.detail.result);

    if(server==="me"){
      stats.servePoint++;
    }

    save(current.causePlayer,null);
    return;
  }

  render();
}

// ===== 判定 =====
function decide(p,r){
  let opp=switchPlayer(p);
  if(r==="A") pointWon(p);
  else pointWon(opp);
}

// ===== 得点 =====
function pointWon(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){

    tbPoints[i]++;
    tbCount++;

    // ★1-2-2サーブ
    if(tbCount===1 || (tbCount>1 && tbCount%2===1)){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      gameWon(i);
      tiebreak=false;
      tbPoints=[0,0];
      tbCount=0;
    }

  }else{

    match.currentGame[i]++;

    if(match.currentGame[i]>=4 && match.currentGame[i]-match.currentGame[o]>=2){
      gameWon(i);
    }
  }

  updateScore();
}

// ===== ゲーム =====
function gameWon(p){

  let o=p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;

  // 統計リセット
  stats={
    firstServeAttempt:0,
    firstServeIn:0,
    doubleFault:0,
    servePoint:0
  };

  // TB開始
  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true;
    return;
  }

  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    match.finished=true;
  }

  server=switchPlayer(server);
}

// ===== 表示 =====
function getScore(){
  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;

  let p=match.currentGame;

  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1]?"Ad 自分":"Ad 相手";
  }

  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function getStats(){

  let first = stats.firstServeAttempt
    ? Math.round(stats.firstServeIn / stats.firstServeAttempt * 100)
    : 0;

  let df = stats.servePoint
    ? Math.round(stats.doubleFault / stats.servePoint * 100)
    : 0;

  return `1st:${first}% / WF:${df}%`;
}

function updateScore(){
  document.getElementById("score").innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}<br>
  ${getStats()}
  `;
}

// ===== CSV =====
function generateCSV(){
  let csv="player,actionIndex,actionType,time\n";
  data.forEach(d=>{
    csv+=`${d.player},${d.actionIndex},${d.actionType},${d.time}\n`;
  });
  return csv;
}

function save(actor,mark){

  gamePointIndex++;

  let actionType="";

  if(mark==="SA") actionType="SA";
  else if(mark==="WF") actionType="WF";
  else if(mark==="'") actionType="'";
  else{
    let d=current.detail;
    actionType=(servePhase===2?"'":"")+d.side+d.style+d.result;
  }

  data.push({
    player:label(actor),
    actionIndex:gamePointIndex,
    actionType,
    time:new Date().toISOString()
  });

  if(mark!=="'") servePhase=1;

  state="type";
  render();
}

// ===== 初期 =====
render(); updateScore();

</script>
</body>
</html>
