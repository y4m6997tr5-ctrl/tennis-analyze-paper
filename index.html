<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }

#score {
  position: fixed;
  top:0;
  width:100%;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
}

#app {
  padding-top:120px;
  padding-bottom:180px;
  text-align:center;
}

/* ★中央配置修正 */
#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#eee;
  padding:15px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width:80%;
  padding:16px;
  margin:6px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];

let server="me";
let servePhase=1;
let gamePointIndex=0;
let gameNumber=1;

// ===== 統計 =====
let stats={
  me:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0},
  opponent:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0}
};

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};

// ===== TB =====
let tiebreak=false;
let tbPoints=[0,0];
let tbCount=0;

const pointMap=[0,15,30,40];

function switchPlayer(p){return p==="me"?"opponent":"me";}
function label(p){
  return p==="me"
  ? `${info.mySchool}/${info.myName}`
  : `${info.oppSchool}/${info.oppName}`;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
    <input id="mySchool" placeholder="自校"><br>
    <input id="oppSchool" placeholder="相手校"><br>
    <input id="myName" placeholder="自分"><br>
    <input id="oppName" placeholder="相手"><br>
    <button onclick="setFirstServer('me')">自分サーブ</button>
    <button onclick="setFirstServer('opponent')">相手サーブ</button>`;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML=`<textarea style="width:95%;height:300px;">${generateCSV()}</textarea>`;
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
    <button onclick="handleType('SA')">SA</button>
    <button onclick="handleType('F')">F</button>
    <button onclick="handleType('Rally')">Rally</button>`;
  }

  // ★ゲーム数をここにも表示（消えないように）
  app.innerHTML=`
    <h3>${label(server)}</h3>
    <p>ゲーム ${match.currentSet[0]}-${match.currentSet[1]}</p>
    <p>${tiebreak?"TB":servePhase+"st"}</p>
  `;
}

// ===== 開始 =====
function setFirstServer(s){info.firstServer=s;}
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";render();
}

// ===== 統計関数 =====
function updateStatsOnServeStart(p){
  if(servePhase===1) stats[p].firstServeAttempt++;
}
function updateStatsOnFirstIn(p){ stats[p].firstServeIn++; }
function updateStatsOnPointEnd(p){ stats[p].servePoint++; }
function updateStatsOnDF(p){
  stats[p].doubleFault++;
  stats[p].servePoint++;
}

// ===== 入力 =====
function handleType(t){

  current={type:t,servePhase};

  if(t==="SA"){
    updateStatsOnServeStart(server);
    updateStatsOnFirstIn(server);
    updateStatsOnPointEnd(server);

    pointWon(server);
    save(server,"SA");
    return;
  }

  if(t==="F"){handleFault();return;}

  updateStatsOnServeStart(server);
  if(servePhase===1) updateStatsOnFirstIn(server);

  current.detail={};
  state="cause";
  render();
}

// ===== フォルト =====
function handleFault(){

  if(!tiebreak && servePhase===1){
    updateStatsOnServeStart(server);
    servePhase=2;
    save(server,"'");
    return;
  }

  updateStatsOnDF(server);

  let opp=switchPlayer(server);
  pointWon(opp);
  save(server,"WF");
}

// ===== 得点 =====
function pointWon(p){

  let i=p==="me"?0:1;
  let o=i===0?1:0;

  if(tiebreak){

    tbPoints[i]++;
    tbCount++;

    if(tbCount===1 || (tbCount>1 && tbCount%2===1)){
      server=switchPlayer(server);
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      gameWon(i);
      tiebreak=false;
      tbPoints=[0,0];
      tbCount=0;
    }

  }else{

    match.currentGame[i]++;
    if(match.currentGame[i]>=4 && match.currentGame[i]-match.currentGame[o]>=2){
      gameWon(i);
    }
  }

  updateScore();
}

// ===== ゲーム =====
function gameWon(p){

  let o=p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;
  gameNumber++;

  stats={
    me:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0},
    opponent:{firstServeAttempt:0,firstServeIn:0,doubleFault:0,servePoint:0}
  };

  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true;
    return;
  }

  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    match.finished=true;
  }

  server=switchPlayer(server);
}

// ===== 表示 =====
function rate(s){
  let first=s.firstServeAttempt?Math.round(s.firstServeIn/s.firstServeAttempt*100):0;
  let df=s.servePoint?Math.round(s.doubleFault/s.servePoint*100):0;
  return `${first}% / ${df}%`;
}

function getScore(){
  if(tiebreak) return `${tbPoints[0]}-${tbPoints[1]}`;

  let p=match.currentGame;
  if(p[0]>=3&&p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1]?"Ad 自分":"Ad 相手";
  }
  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  document.getElementById("score").innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}<br>
  自:${rate(stats.me)} 相:${rate(stats.opponent)}
  `;
}

// ===== 保存 =====
function save(actor,mark){

  gamePointIndex++;

  data.push({
    player:label(actor),
    gameNumber,
    actionIndex:gamePointIndex,
    actionType:mark||"",
    time:new Date().toISOString()
  });

  if(mark!=="'") servePhase=1;

  state="type";
  render();
}

// ===== CSV =====
function generateCSV(){
  let csv="player,game,actionIndex,actionType,time\n";
  data.forEach(d=>{
    csv+=`${d.player},${d.gameNumber},${d.actionIndex},${d.actionType},${d.time}\n`;
  });
  return csv;
}

// ===== 初期 =====
render();updateScore();

</script>
</body>
</html>
