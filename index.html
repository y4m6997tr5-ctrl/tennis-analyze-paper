<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; }
#score { position: fixed; top: 0; width: 100%; background: black; color: white; padding: 12px; text-align: center; }
#app { padding-top: 100px; padding-bottom: 180px; text-align: center; }
#controls { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 15px 0; text-align: center; }
button { width: 70%; padding: 18px; margin: 6px; font-size: 18px; }
input { width: 80%; padding: 10px; margin: 5px; font-size: 16px; }
</style>
</head>

<body>

<div id="score"></div>
<div id="app"></div>
<div id="controls"></div>

<script>

// ===== 基本 =====
let info={mySchool:"",oppSchool:"",myName:"",oppName:"",firstServer:"me"};
let state="setup",current={},data=[];
let server="me",servePhase=1;
let gamePointIndex=0;

// ===== タイブレーク用 =====
let tiebreak=false;
let tbPoints=[0,0];
let tbCount=0;

// ===== スコア =====
let match={currentSet:[0,0],currentGame:[0,0],finished:false};
const pointMap=[0,15,30,40];

// ===== 表示 =====
function label(p){
  return p==="me"?`${info.mySchool}/${info.myName}`:`${info.oppSchool}/${info.oppName}`;
}

// ===== UI =====
function render(){
  const app=document.getElementById("app");
  const controls=document.getElementById("controls");

  if(state==="setup"){
    app.innerHTML=`
      <input id="mySchool" placeholder="自校名"><br>
      <input id="oppSchool" placeholder="相手校名"><br>
      <input id="myName" placeholder="名前"><br>
      <input id="oppName" placeholder="相手名"><br>
      <button onclick="setFirstServer('me')">自分サーブ</button>
      <button onclick="setFirstServer('opponent')">相手サーブ</button>
    `;
    controls.innerHTML=`<button onclick="startMatch()">開始</button>`;
    return;
  }

  if(match.finished){
    app.innerHTML=`<textarea style="width:95%;height:300px;">${generateCSV()}</textarea>`;
    controls.innerHTML="";
    return;
  }

  if(state==="type"){
    controls.innerHTML=`
      <button onclick="handleType('SA')">サービスエース</button>
      <button onclick="handleType('F')">フォルト</button>
      <button onclick="handleType('Rally')">ラリー</button>
    `;
  }

  app.innerHTML=`
    <h3>${label(server)}</h3>
    <p>${tiebreak?"タイブレーク":(servePhase===1?"1st":"2nd")}</p>
  `;
}

// ===== 試合開始 =====
function setFirstServer(s){info.firstServer=s;}
function startMatch(){
  info.mySchool=mySchool.value;
  info.oppSchool=oppSchool.value;
  info.myName=myName.value;
  info.oppName=oppName.value;
  server=info.firstServer;
  state="type";render();
}

// ===== 入力 =====
function handleType(t){
  if(t==="SA"){ pointWon(server); save(server,"SA"); return; }
  if(t==="F"){ handleFault(); return; }
}

// ===== フォルト =====
function handleFault(){
  if(!tiebreak && servePhase===1){
    servePhase=2; save(server,"'"); return;
  }
  let opp=server==="me"?"opponent":"me";
  pointWon(opp);
  save(server,"WF");
}

// ===== 得点 =====
function pointWon(p){
  let i=p==="me"?0:1,o=i===0?1:0;

  if(tiebreak){
    tbPoints[i]++;

    // サーブ交代（1-2-2）
    tbCount++;
    if(tbCount===1 || tbCount%2===1){
      server = server==="me"?"opponent":"me";
    }

    if(tbPoints[i]>=7 && tbPoints[i]-tbPoints[o]>=2){
      gameWon(i);
      tiebreak=false;
      tbPoints=[0,0];
      tbCount=0;
    }

  }else{
    match.currentGame[i]++;

    if(match.currentGame[i]>=4 && match.currentGame[i]-match.currentGame[o]>=2){
      gameWon(i);
    }
  }

  updateScore();
}

// ===== ゲーム =====
function gameWon(p){
  let o=p===0?1:0;

  match.currentSet[p]++;
  match.currentGame=[0,0];
  gamePointIndex=0;

  // タイブレーク突入
  if(match.currentSet[0]===6 && match.currentSet[1]===6){
    tiebreak=true;
    return;
  }

  // セット勝利
  if(match.currentSet[p]>=6 && match.currentSet[p]-match.currentSet[o]>=2){
    match.finished=true;
  }

  // 通常サーブ交代
  server = server==="me"?"opponent":"me";
}

// ===== CSV =====
function generateCSV(){
  let csv="player,actionIndex,actionType,time\n";
  data.forEach(d=>csv+=`${d.player},${d.actionIndex},${d.actionType},${d.time}\n`);
  return csv;
}

// ===== 表示 =====
function getScore(){
  if(tiebreak){
    return `${tbPoints[0]}-${tbPoints[1]}`;
  }

  let p=match.currentGame;

  if(p[0]>=3 && p[1]>=3){
    if(p[0]===p[1]) return "デュース";
    return p[0]>p[1]?"Ad 自分":"Ad 相手";
  }

  return `${pointMap[p[0]]}-${pointMap[p[1]]}`;
}

function updateScore(){
  score.innerHTML=`
  ${info.myName} vs ${info.oppName}<br>
  ゲーム ${match.currentSet[0]}-${match.currentSet[1]} |
  ポイント ${getScore()}
  `;
}

// ===== 保存（簡略） =====
function save(player,action){
  gamePointIndex++;
  data.push({
    player:label(player),
    actionIndex:gamePointIndex,
    actionType:action,
    time:new Date().toISOString()
  });
}

// ===== 初期 =====
render();updateScore();

</script>

</body>
</html>
